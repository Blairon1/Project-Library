<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="header">Library</div>
        <div class="book-addition">
            <button class="btn">Add a new Book!</button>
        </div>
        <div class="main-section" id="main-section"></div>
        <dialog class="book-creation" id="book-creation">
                <h2 style="margin-bottom: 1.8rem;">Complete the following information</h2>
                <form action="form" method="dialog" class="library-form" id="library-form">
                    <label for="bname">Book Name:</label>
                    <input type="text" name="bookName" id="bname" required minlength="1" maxlength="23"> <br>

                    <label for="aname">Author:</label>
                    <input type="text" name="author" id="aname" required minlength="1" maxlength="23"> <br>

                    <label for="nopages">Number of Pages:</label>
                    <input type="number" name="numOfPages" id="nopages" required min="1" max="10000"> <br>

                    <label for="hread">Has you read this book?</label>
                    <input type="checkbox" name="hasRead" id="hread">

                    <button class="close-window" formnovalidate type="button">Close Window</button>
                    <button class="submit-book" type="submit">Submit Book</button>
                </form>
            </dialog>

        <template class="book-display">
            <div class="book-card">
                <img src="icons/book-open-variant-outline.svg" alt="Book Icon">

                <div class="book-info">
                    <p class="bookTitle"></p>
                    <p class="bookAuthor"> </p>
                    <p class="numPages">TBA</p>

                    <p class="hasRead">Have you read it:</p>
                    <button class="hasReadBtn">Yes</button>
                    <img src="icons/close-thick.svg" alt="Book Icon" class="close-book">
                </div>
            </div>
        </template>
    </div>
    
</body>
</html>
